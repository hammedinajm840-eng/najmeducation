<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجم الدين همادي - منصة تعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }

        body {
            overflow-x: hidden;
            background: radial-gradient(ellipse 65% 55% at 95% 0%, #7e22ce 0%, transparent 65%), radial-gradient(ellipse 35% 30% at 100% 0%, #a855f7 0%, transparent 45%), #0f0618;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .subject-card {
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease;
        }
        .subject-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.14); }
        .subject-card:active { transform: scale(0.97); }

        .hidden-scroll::-webkit-scrollbar { display: none; }

        .sidebar-btn { transition: all 0.2s ease; }
        .sidebar-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        #current-level-btn { transition: all 0.3s ease; position: relative; overflow: hidden; }
        #current-level-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent); pointer-events:none; }
        #current-level-btn:hover { transform:scale(1.02); background:rgba(255,255,255,0.18)!important; border-color:rgba(255,255,255,0.4)!important; }

        /* ── MOBILE NAV ── */
        #mobile-nav {
            display: none;
        }
        @media (max-width: 1023px) {
            #desktop-sidebar { display: none !important; }
            #mobile-nav { display: flex !important; }
            main { padding-bottom: 90px !important; }
            .grid { grid-template-columns: 1fr !important; }
        }

        .mob-nav-btn { transition: all 0.2s ease; }
        .mob-nav-btn.active { background: rgba(124,58,237,0.35); }
        .mob-nav-btn.active span { color: white !important; }

        @media (max-width: 640px) {
            #level-title { font-size: 1.5rem !important; margin-bottom: 0.6rem !important; }
            #subjects-container { grid-template-columns: 1fr !important; gap: 0.75rem !important; }
            #subjects-container .subject-card { padding: 0.9rem !important; }
            #subjects-container .w-20 { width: 3rem !important; height: 3rem !important; font-size: 1.6rem !important; }
            #subjects-container h2.text-3xl { font-size: 1.1rem !important; }
            #subjects-container .flex.gap-3 { flex-wrap: wrap; gap: 0.4rem !important; }
            #subject-header { gap: 0.5rem; }
            #subject-header button { font-size: 0.8rem; padding: 0.35rem 0.75rem; }
            #subject-icon { font-size: 2rem !important; }
            #subject-name { font-size: 1.2rem !important; }
            #subject-page .flex.justify-end { flex-wrap: wrap; gap: 0.5rem; }
            #subject-page .flex.gap-2.bg-white\/10 { flex-wrap: wrap; }
            .file-item { flex-direction: column; align-items: flex-start !important; }
            .file-item .flex.gap-2 { flex-wrap: wrap; }
            #subjects-container h1.text-6xl { font-size: 1.6rem !important; }
            #subjects-container p.text-2xl { font-size: 0.95rem !important; }
            #home-page .text-2xl { font-size: 1rem !important; }
        }

        @media (min-width: 641px) and (max-width: 1023px) {
            #subjects-container { grid-template-columns: repeat(2, 1fr) !important; }
        }

        /* ── PAGE TRANSITIONS ── */
        #page-wrapper { position:relative; width:100%; overflow:hidden; }

        #home-page {
            width:100%;
            transition: transform 0.6s cubic-bezier(.86,0,.07,1), opacity 0.5s ease, filter 0.5s ease;
        }
        #home-page.slide-out-right { transform:translateY(-60%) scale(0.92); opacity:0; filter:blur(5px); pointer-events:none; }
        #home-page.slide-in-from-right { transform:translateY(0) scale(1); opacity:1; filter:blur(0px); }

        #subject-page {
            position:absolute; top:0; left:0; width:100%;
            transform:translateY(60%) scale(0.92); opacity:0; filter:blur(5px);
            transition: transform 0.6s cubic-bezier(.86,0,.07,1), opacity 0.5s ease, filter 0.5s ease;
            pointer-events:none;
        }
        #subject-page.slide-in { transform:translateY(0) scale(1); opacity:1; filter:blur(0px); pointer-events:all; }
        #subject-page.slide-out-left { transform:translateY(60%) scale(0.92); opacity:0; filter:blur(5px); pointer-events:none; }

        #flip-flash {
            position:fixed; inset:0;
            background:radial-gradient(ellipse at center,rgba(139,92,246,0.15) 0%,transparent 70%);
            pointer-events:none; opacity:0; z-index:100; transition:opacity 0.2s ease;
        }
        #flip-flash.active { opacity:1; }

        @keyframes fileIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .file-item { animation: fileIn 0.35s ease both; }

        @keyframes sectionIn {
            0%{opacity:0;transform:translateY(20px) scale(.96)}
            60%{transform:translateY(-4px) scale(1.01)}
            100%{opacity:1;transform:translateY(0) scale(1)}
        }
        .section-card { animation: sectionIn 0.5s cubic-bezier(.34,1.56,.64,1) both; }
        .section-card:nth-child(1){animation-delay:.05s}
        .section-card:nth-child(2){animation-delay:.15s}
        .section-card:nth-child(3){animation-delay:.25s}

        @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes featureCardIn { from{opacity:0;transform:translateY(30px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }
        .subject-card { animation: cardIn 0.45s cubic-bezier(.34,1.56,.64,1) both; }
        .subject-card:nth-child(1){animation-delay:.03s}
        .subject-card:nth-child(2){animation-delay:.1s}
        .subject-card:nth-child(3){animation-delay:.17s}
        .subject-card:nth-child(4){animation-delay:.24s}

        @keyframes spinIn { from{opacity:0;transform:rotate(-15deg) scale(0.7)} to{opacity:1;transform:rotate(0) scale(1)} }
        .icon-spin { animation: spinIn 0.5s cubic-bezier(.34,1.56,.64,1) both; }

        #back-btn { transition: transform 0.2s ease, background 0.2s ease; }
        #back-btn:hover { transform:scale(1.05) translateX(-3px); }
        #back-btn:active { transform:scale(0.95); }

        .section-tab.active { background:#7c3aed; color:white; box-shadow:0 2px 10px rgba(124,58,237,0.5); }
        .section-tab { transition: all 0.2s ease; }
        .section-tab:hover:not(.active) { background:rgba(255,255,255,0.1); }

        #progress-bar {
            position:fixed; top:0; left:0; height:3px;
            background:linear-gradient(90deg,#3b82f6,#06b6d4,#10b981);
            transition:width 0.3s ease; z-index:9999;
        }

        .level-card-1{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
        .level-card-2{background:linear-gradient(135deg,#0ea5e9,#38bdf8)}
        .level-card-3{background:linear-gradient(135deg,#10b981,#34d399)}
        .level-card-4{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
        .level-card-5{background:linear-gradient(135deg,#ef4444,#f87171)}
        .level-card-6{background:linear-gradient(135deg,#ec4899,#f472b6)}

    </style>
</head>
<body>

<div id="progress-bar" style="width:0%"></div>
<div id="flip-flash"></div>

<div class="w-full min-h-screen shadow-2xl overflow-hidden" style="background:transparent;">
    <div class="grid lg:grid-cols-[280px_1fr] min-h-screen">

        <!-- ===== SIDEBAR ===== -->

                    <img src="./images/logo.png.png" class="w-full h-full object-contain" alt="شعار">

                <h1 class="text-4xl font-black text-blue-700 mt-5">نجم الدين همادي</h1>

                <!-- زر المستوى الحالي -->

                    <span id="level-btn-icon">✨</span>
                    <span id="level-btn-text">المستوى</span>

                <button onclick="handleOpenLogin()" class="sidebar-btn w-full bg-purple-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">🔐 تسجيل الدخول</button>
                <button id="logout-btn" onclick="handleLogout()" class="hidden sidebar-btn w-full bg-red-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">🚪 تسجيل الخروج</button>
                <div id="bg-btn-container" class="hidden mt-4">

        </aside>

        <!-- ===== MAIN ===== -->
        <main class="p-6 relative overflow-hidden" style="background:transparent;">

            <div id="page-wrapper">

                <!-- ═══ HOME PAGE ═══ -->
                <div id="home-page">
                    <h1 id="level-title" class="text-center text-6xl font-black text-green-700 mb-8">✨ السنة الأولى ✨</h1>

                    <div class="bg-white rounded-[30px] shadow-lg p-4 mb-8">

                    </div>



                    <!-- أزرار القصص والألعاب والبحوث -->
                    <div class="mb-8 grid grid-cols-3 gap-3">
                        <button onclick="handleOpenStoriesPage()"
                            class="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white py-4 rounded-[25px] font-black text-base shadow-xl flex flex-col items-center justify-center gap-2 transition-transform hover:scale-[1.02] active:scale-[0.98]">
                            <span class="text-3xl">📖</span>
                            <span>القصص</span>
                            <span class="bg-white/20 px-2 py-0.5 rounded-lg text-xs font-bold" id="stories-level-badge">السنة الأولى</span>
                        </button>
                        <button onclick="handleOpenGamesPage()"
                            class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-white py-4 rounded-[25px] font-black text-base shadow-xl flex flex-col items-center justify-center gap-2 transition-transform hover:scale-[1.02] active:scale-[0.98]">
                            <span class="text-3xl">🎮</span>
                            <span>الألعاب</span>
                            <span class="bg-white/20 px-2 py-0.5 rounded-lg text-xs font-bold" id="games-level-badge">السنة الأولى</span>
                        </button>
                        <button onclick="handleOpenResearchPage()"
                            class="w-full bg-gradient-to-r from-red-600 to-rose-500 text-white py-4 rounded-[25px] font-black text-base shadow-xl flex flex-col items-center justify-center gap-2 transition-transform hover:scale-[1.02] active:scale-[0.98]">
                            <span class="text-3xl">🔬</span>
                            <span>البحوث</span>
                            <span class="bg-white/20 px-2 py-0.5 rounded-lg text-xs font-bold" id="research-level-badge">السنة الأولى</span>
                        </button>
                    </div>

                    <div id="subjects-container" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                </div>

                <!-- ═══ STORIES PAGE ═══ -->
                <div id="stories-page"
                     style="position:absolute;top:0;left:0;width:100%;transform:translateY(60%) scale(0.92);opacity:0;filter:blur(5px);transition:transform 0.6s cubic-bezier(.86,0,.07,1),opacity 0.5s ease,filter 0.5s ease;pointer-events:none;">

                    <div class="flex items-center gap-4 mb-6">
                        <button onclick="goBackFromStories()"
                            class="flex items-center gap-2 bg-white border-2 border-purple-300 text-purple-700 px-5 py-2 rounded-xl font-black text-base shadow-md transition-transform hover:scale-105">
                            ➜ رجوع
                        </button>
                        <div class="flex items-center gap-3">
                            <span class="text-5xl">📖</span>
                            <div>
                                <p id="stories-level-label" class="text-purple-300 font-bold text-sm"></p>
                                <h2 class="text-3xl font-black text-white">مكتبة القصص</h2>
                            </div>
                        </div>
                        <button id="stories-upload-btn" onclick="handleStoriesUpload()" class="hidden mr-auto bg-purple-600 text-white px-4 py-2 rounded-xl font-bold text-sm">⬆ رفع قصة</button>
                    </div>

                    <div class="bg-white/10 border border-white/15 rounded-2xl p-5 shadow-lg">
                        <div id="stories-files-box" class="space-y-3">
                            <p class="text-white/40 font-bold text-center py-6 text-lg">⏳ جاري التحميل...</p>
                        </div>
                    </div>
                </div>

                <!-- ═══ GAMES PAGE ═══ -->
                <div id="games-page"
                     style="position:absolute;top:0;left:0;width:100%;transform:translateY(60%) scale(0.92);opacity:0;filter:blur(5px);transition:transform 0.6s cubic-bezier(.86,0,.07,1),opacity 0.5s ease,filter 0.5s ease;pointer-events:none;">

                    <div class="flex items-center gap-4 mb-6 flex-wrap">
                        <button onclick="goBackFromGames()"
                            class="flex items-center gap-2 bg-white border-2 border-yellow-300 text-yellow-700 px-5 py-2 rounded-xl font-black text-base shadow-md transition-transform hover:scale-105">

                        </button>
                        <div class="flex items-center gap-3">
                            <span class="text-5xl">🎮</span>
                            <div>
                                <p id="games-level-label" class="text-yellow-300 font-bold text-sm"></p>

                        </div>
                    </div>
                </div>

                <!-- ═══ RESEARCH PAGE ═══ -->
                <div id="research-page"
                     style="position:absolute;top:0;left:0;width:100%;transform:translateY(60%) scale(0.92);opacity:0;filter:blur(5px);transition:transform 0.6s cubic-bezier(.86,0,.07,1),opacity 0.5s ease,filter 0.5s ease;pointer-events:none;">

                    <div class="flex items-center gap-4 mb-6 flex-wrap">
                        <button onclick="goBackFromResearch()"
                            class="flex items-center gap-2 bg-white border-2 border-red-300 text-red-700 px-5 py-2 rounded-xl font-black text-base shadow-md transition-transform hover:scale-105">
                            ➜ رجوع
                        </button>
                        <div class="flex items-center gap-3">
                            <span class="text-5xl">🔬</span>
                            <div>
                                <p id="research-level-label" class="text-red-300 font-bold text-sm"></p>
                                <h2 class="text-3xl font-black text-white">البحوث المدرسية</h2>

                </div>

                <!-- ═══ SUBJECT DETAIL PAGE ═══ -->

                            <button id="tab-exercises" onclick="switchTab('exercises')" class="section-tab px-4 py-2 rounded-lg font-bold text-sm text-white/60">📝 التمارين</button>

                    </div>

                    <div id="panel-lessons" class="section-panel">
                        <div class="section-card bg-white/10 border border-white/15 rounded-2xl p-5 shadow-lg">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-black text-white text-xl">📘 الدروس</h3>
                            </div>
                            <div class="files-box space-y-3"></div>
                        </div>
                    </div>

                    <div id="panel-exercises" class="section-panel hidden">
                        <div class="section-card bg-white/10 border border-white/15 rounded-2xl p-5 shadow-lg">
                            <div class="flex justify-between items-center mb-4">

                            <div class="flex justify-between items-center mb-4">

                            </div>
                            <div class="files-box space-y-3"></div>
                        </div>
                    </div>

                </div><!-- /subject-page -->

            </div><!-- /page-wrapper -->
        </main>
    </div>
</div>

<nav id="mobile-nav" class="fixed bottom-0 left-0 right-0 z-50 flex items-center justify-around px-2 py-2 border-t"

    <button onclick="window._setMobActive && window._setMobActive('mob-research-btn'); handleOpenResearchPage()" id="mob-research-btn"

        <span class="text-2xl">🔬</span>
        <span class="text-xs font-bold">البحوث</span>
    </button>
    <button onclick="window._setMobActive && window._setMobActive('mob-login-btn'); handleOpenLogin()" id="mob-login-btn"
        class="mob-nav-btn flex flex-col items-center gap-1 px-3 py-2 rounded-2xl text-white/60 transition-all">
        <span class="text-2xl">🔐</span>
        <span class="text-xs font-bold">دخول</span>
    </button>
</nav>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://wsrwidfvcrmppayfbqel.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ujQvwUEUXp7_-enFhO2awQ_hoJHa6Mg';
    const BUCKET       = 'school-files';
    const supabase     = createClient(SUPABASE_URL, SUPABASE_KEY);

    const homePage          = document.getElementById('home-page');
    const subjectPage       = document.getElementById('subject-page');
    const subjectsContainer = document.getElementById('subjects-container');
    const levelTitle        = document.getElementById('level-title');
    const searchInput       = document.getElementById('search-input');
    const progressBar       = document.getElementById('progress-bar');

    /* ── Progress ── */

        progressBar.style.width = '30%';
        setTimeout(() => progressBar.style.width = '70%', 200);
    }
    function finishProgress() {
        progressBar.style.width = '100%';
        setTimeout(() => { progressBar.style.width = '0%'; }, 400);

    /* ── Flash ── */
    const flipFlash = document.getElementById('flip-flash');
    function triggerFlash() {
        flipFlash.classList.add('active');
        setTimeout(() => flipFlash.classList.remove('active'), 250);
    }

    /* ── Update sidebar level button ── */
    function updateLevelBtn(level) {
        const iconEl = document.getElementById('level-btn-icon');
        const textEl = document.getElementById('level-btn-text');
        if (iconEl) iconEl.textContent = levelEmoji[level] || '✨';
        if (textEl) textEl.textContent = 'المستوى';
        const mobIcon = document.getElementById('mob-level-icon');
        if (mobIcon) mobIcon.textContent = levelEmoji[level] || '✨';
    }

    function setMobActive(id) {
        document.querySelectorAll('.mob-nav-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(id);
        if (btn) btn.classList.add('active');

    /* ── Navigation ── */
    function navigateToSubject(subjectId, subjectTitle, level, levelId) {
        currentSubject = { id: subjectId, title: subjectTitle, level, levelId };

        document.getElementById('subject-icon').textContent = subjectIcons[subjectId] || '📘';
        document.getElementById('subject-level-label').textContent = level;
        document.getElementById('back-btn').innerHTML = `➜ ${level}`;
        const nameEl = document.getElementById('subject-name');
        nameEl.textContent = subjectTitle;
        nameEl.className   = `text-3xl font-black text-white`;

        switchTab('lessons', false);
        triggerFlash();
        homePage.classList.add('slide-out-right');
        subjectPage.classList.remove('slide-out-left');
        subjectPage.classList.add('slide-in');
        setTimeout(() => loadSubjectFiles(), 300);

    window.goBack = function() {
        triggerFlash();
        subjectPage.classList.remove('slide-in');
        subjectPage.classList.add('slide-out-left');
        homePage.classList.remove('slide-out-right');
        homePage.classList.add('slide-in-from-right');
        setTimeout(() => homePage.classList.remove('slide-in-from-right'), 700);
        currentSubject = null;
    };

    /* ── Tabs ── */
    window.switchTab = function(tab, reload = true) {
        activeTab = tab;
        ['lessons','exercises','exams'].forEach(t => {
            const panel  = document.getElementById('panel-' + t);
            const tabBtn = document.getElementById('tab-' + t);
            if (t === tab) {
                panel.classList.remove('hidden');
                tabBtn.classList.add('active');
                tabBtn.classList.remove('text-white/60');
                tabBtn.classList.add('text-white');
                const card = panel.querySelector('.section-card');
                if (card) { card.style.animation='none'; requestAnimationFrame(()=>{ card.style.animation=''; }); }
            } else {
                panel.classList.add('hidden');
                tabBtn.classList.remove('active');
                tabBtn.classList.remove('text-white');
                tabBtn.classList.add('text-white/60');
            }
        });
        const uploadBtn = document.getElementById('global-upload-btn');
        if (uploadBtn) uploadBtn.dataset.folder = tab;
        if (reload && currentSubject) loadSubjectFiles();
    };

    /* ── Load Files ── */
    async function loadSubjectFiles() {
        if (!currentSubject) return;
        showProgress();

        const panels = ['lessons','exercises','exams'];
        for (const folder of panels) {
            const panel   = document.getElementById('panel-' + folder);
            const filesBox = panel.querySelector('.files-box');
            filesBox.innerHTML = `<p class="text-white/40 font-bold text-center py-4">⏳ جاري التحميل...</p>`;

            const { data, error } = await supabase
                .from('files').select('*')
                .eq('level',   currentSubject.levelId)
                .eq('subject', currentSubject.id)
                .eq('folder',  folder);

            if (error) { console.error(error); continue; }

            filesBox.innerHTML = '';
            if (!data || data.length === 0) {
                filesBox.innerHTML = `<p class="text-white/40 font-bold text-center py-6 text-lg">لا توجد ملفات بعد</p>`;
            } else {
                data.forEach((file, i) => {
                    const deleteBtn = isAdmin
                        ? `<button onclick="handleDeleteFile('${file.id}','${file.storage_path||''}')"
                               class="bg-red-500/80 hover:bg-red-500 text-white px-3 py-2 rounded-xl text-sm font-bold transition-colors">🗑 حذف</button>`
                        : '';
                    filesBox.innerHTML += `
                        <div class="file-item bg-white/10 border border-white/15 rounded-xl px-5 py-3 flex justify-between items-center gap-3"
                             style="animation-delay:${i*0.06}s">
                            <p class="font-bold text-white text-sm overflow-hidden whitespace-nowrap text-ellipsis max-w-[55%]" title="${file.name}">
                                📄 ${file.name}
                            </p>
                            <div class="flex gap-2 flex-shrink-0">
                                <a href="${file.url}" target="_blank" rel="noopener"
                                   class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors">فتح</a>
                                <a href="${file.url}" download="${file.name}" target="_blank" rel="noopener"
                                   class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors">تحميل</a>
                                ${deleteBtn}
                            </div>
                        </div>`;
                });
            }
        }

        if (isAdmin) {
            document.querySelectorAll('#subject-page .upload-btn').forEach(b => b.classList.remove('hidden'));
        }
        attachSubjectUploadEvents();
        finishProgress();
    }

    /* ── Upload ── */
    function attachSubjectUploadEvents() {
        document.querySelectorAll('#subject-page .upload-btn').forEach(button => {
            const freshBtn = button.cloneNode(true);
            button.parentNode.replaceChild(freshBtn, button);

            freshBtn.addEventListener('click', () => {
                const input  = document.createElement('input');
                input.type   = 'file';
                input.accept = '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4';
                input.onchange = async (e) => {
                    const file   = e.target.files[0];
                    if (!file) return;
                    const folder = freshBtn.dataset.folder;
                    freshBtn.disabled  = true;
                    freshBtn.innerText = '⏳ جاري الرفع...';
                    try {
                        const path = `${currentSubject.levelId}/${currentSubject.id}/${folder}/${Date.now()}-${file.name}`;
                        const { error: upErr } = await supabase.storage
                            .from(BUCKET).upload(path, file, { upsert:true, contentType:file.type });
                        if (upErr) { alert('فشل الرفع: ' + upErr.message); return; }

                        const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
                        const { error: dbErr } = await supabase.from('files').insert([{
                            name: file.name, url: urlData.publicUrl, storage_path: path,
                            level: currentSubject.levelId, subject: currentSubject.id, folder,
                        }]);
                        if (dbErr) { alert('خطأ في قاعدة البيانات: ' + dbErr.message); return; }
                        alert('✅ تم الرفع بنجاح');
                        loadSubjectFiles();
                    } catch(err) {
                        console.error(err); alert('خطأ غير متوقع');
                    } finally {
                        freshBtn.disabled  = false;
                        freshBtn.innerText = '⬆ رفع ملف';
                    }
                };
                input.click();
            });
        });
    }

    /* ── Delete ── */
    window.handleDeleteFile = async function(fileId, storagePath) {
        if (!confirm('هل تريد حذف هذا الملف نهائيًا؟')) return;
        if (storagePath) {
            await supabase.storage.from(BUCKET).remove([storagePath]);
        }
        const { error } = await supabase.from('files').delete().eq('id', fileId);
        if (error) { alert('فشل الحذف: ' + error.message); return; }
        alert('✅ تم الحذف');
        loadSubjectFiles();
    };

        document.querySelectorAll('.level-btn').forEach(b => {

                        <span onclick="event.stopPropagation();handleOpenSubjectTab('${subject.id}','${subject.title}','${level}','${levelId}','exercises')"
                              class="cursor-pointer bg-yellow-50 hover:bg-yellow-100 text-yellow-600 px-4 py-2 rounded-xl text-sm font-bold transition-colors">📝 التمارين</span>

                    </div>
                    <div class="mt-5 flex justify-end">
                        <span class="text-blue-500 font-black text-lg">← انقر للدخول</span>

        });

    window.handleStoriesUpload = async function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('stories-upload-btn');
            btn.disabled = true; btn.innerText = '⏳ جاري الرفع...';
            try {
                const path = `${currentStoriesLevel.levelId}/stories/stories/${Date.now()}-${file.name}`;
                const { error: upErr } = await supabase.storage.from(BUCKET).upload(path, file, { upsert:true, contentType:file.type });
                if (upErr) { alert('فشل الرفع: ' + upErr.message); return; }
                const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
                const { error: dbErr } = await supabase.from('files').insert([{
                    name: file.name, url: urlData.publicUrl, storage_path: path,
                    level: currentStoriesLevel.levelId, subject: 'stories', folder: 'stories',

        };
        input.click();

        loadStoriesFiles();

        if (currentStoriesLevel) {
            goBackFromStories();
            setTimeout(callback, 650);
        } else if (currentGamesLevel) {
            goBackFromGames();
            setTimeout(callback, 650);
        } else if (currentResearchLevel) {
            goBackFromResearch();
            setTimeout(callback, 650);

            goBack();
            setTimeout(callback, 650);
        } else {
            setTimeout(callback, delay);

        finishProgress();

    window.handleGamesUpload = async function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4,.html,.zip';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('games-upload-btn');
            btn.disabled = true; btn.innerText = '⏳ جاري الرفع...';
            try {
                const path = `${currentGamesLevel.levelId}/games/games/${Date.now()}-${file.name}`;
                const { error: upErr } = await supabase.storage.from(BUCKET).upload(path, file, { upsert:true, contentType:file.type });
                if (upErr) { alert('فشل الرفع: ' + upErr.message); return; }
                const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
                const { error: dbErr } = await supabase.from('files').insert([{
                    name: file.name, url: urlData.publicUrl, storage_path: path,
                    level: currentGamesLevel.levelId, subject: 'games', folder: 'games',
                }]);
                if (dbErr) { alert('خطأ: ' + dbErr.message); return; }
                alert('✅ تم رفع اللعبة');
                loadGamesFiles();
            } catch(err) { console.error(err); alert('خطأ غير متوقع'); }
            finally { btn.disabled = false; btn.innerText = '⬆ رفع لعبة'; }
        };
        input.click();
    };

    window.handleDeleteGame = async function(fileId, storagePath) {
        if (!confirm('هل تريد حذف هذه اللعبة نهائيًا؟')) return;
        if (storagePath) await supabase.storage.from(BUCKET).remove([storagePath]);
        const { error } = await supabase.from('files').delete().eq('id', fileId);
        if (error) { alert('فشل الحذف'); return; }
        alert('✅ تم الحذف');
        loadGamesFiles();
    };

    /* ══════════════════════════════
       صفحة البحوث المدرسية
    ══════════════════════════════ */
    const researchPage = document.getElementById('research-page');
    let currentResearchLevel = null;

    window.handleOpenResearchPage = function() {
        currentResearchLevel = { level: currentLevel, levelId: levelMap[currentLevel] };
        document.getElementById('research-level-label').textContent = currentLevel;
        triggerFlash();
        homePage.classList.add('slide-out-right');
        researchPage.style.pointerEvents = 'all';
        researchPage.style.transform = 'translateY(0) scale(1)';
        researchPage.style.opacity = '1';
        researchPage.style.filter = 'blur(0px)';
        if (isAdmin) document.getElementById('research-upload-btn').classList.remove('hidden');
        loadResearchFiles();
    };

    window.goBackFromResearch = function() {
        triggerFlash();
        researchPage.style.transform = 'translateY(60%) scale(0.92)';
        researchPage.style.opacity = '0';
        researchPage.style.filter = 'blur(5px)';
        researchPage.style.pointerEvents = 'none';
        homePage.classList.remove('slide-out-right');
        homePage.classList.add('slide-in-from-right');
        setTimeout(() => homePage.classList.remove('slide-in-from-right'), 700);
        currentResearchLevel = null;
    };

    async function loadResearchFiles() {
        if (!currentResearchLevel) return;
        showProgress();
        const box = document.getElementById('research-files-box');
        box.innerHTML = `<p class="text-white/40 font-bold text-center py-4">⏳ جاري التحميل...</p>`;

        const { data, error } = await supabase
            .from('files').select('*')
            .eq('level',   currentResearchLevel.levelId)
            .eq('subject', 'research')
            .eq('folder',  'research');

        box.innerHTML = '';
        if (error || !data || data.length === 0) {
            box.innerHTML = `<p class="text-white/40 font-bold text-center py-6 text-lg">🔬 لا توجد بحوث بعد لهذا المستوى</p>`;
        } else {
            data.forEach((file, i) => {
                const deleteBtn = isAdmin
                    ? `<button onclick="handleDeleteResearch('${file.id}','${file.storage_path||''}')"
                           class="bg-red-500/80 hover:bg-red-500 text-white px-3 py-2 rounded-xl text-sm font-bold">🗑 حذف</button>`
                    : '';
                box.innerHTML += `
                    <div class="file-item bg-white/10 border border-white/15 rounded-xl px-5 py-3 flex justify-between items-center gap-3"
                         style="animation-delay:${i*0.06}s">
                        <p class="font-bold text-white text-sm overflow-hidden whitespace-nowrap text-ellipsis max-w-[55%]" title="${file.name}">
                            🔬 ${file.name}
                        </p>
                        <div class="flex gap-2 flex-shrink-0">
                            <a href="${file.url}" target="_blank" rel="noopener"
                               class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold">فتح</a>
                            <a href="${file.url}" download="${file.name}" target="_blank" rel="noopener"
                               class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold">تحميل</a>
                            ${deleteBtn}
                        </div>
                    </div>`;
            });
        }
        finishProgress();
    }

    window.handleResearchUpload = async function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const btn = document.getElementById('research-upload-btn');
            btn.disabled = true; btn.innerText = '⏳ جاري الرفع...';
            try {
                const path = `${currentResearchLevel.levelId}/research/research/${Date.now()}-${file.name}`;
                const { error: upErr } = await supabase.storage.from(BUCKET).upload(path, file, { upsert:true, contentType:file.type });
                if (upErr) { alert('فشل الرفع: ' + upErr.message); return; }
                const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
                const { error: dbErr } = await supabase.from('files').insert([{
                    name: file.name, url: urlData.publicUrl, storage_path: path,
                    level: currentResearchLevel.levelId, subject: 'research', folder: 'research',
                }]);
                if (dbErr) { alert('خطأ: ' + dbErr.message); return; }
                alert('✅ تم رفع البحث');
                loadResearchFiles();
            } catch(err) { console.error(err); alert('خطأ غير متوقع'); }
            finally { btn.disabled = false; btn.innerText = '⬆ رفع بحث'; }
        };
        input.click();
    };

    window.handleDeleteResearch = async function(fileId, storagePath) {
        if (!confirm('هل تريد حذف هذا البحث نهائيًا؟')) return;
        if (storagePath) await supabase.storage.from(BUCKET).remove([storagePath]);
        const { error } = await supabase.from('files').delete().eq('id', fileId);
        if (error) { alert('فشل الحذف'); return; }
        alert('✅ تم الحذف');
        loadResearchFiles();
    };

    /* ══════════════════════════════
       صفحة جميع المستويات (جديدة)
    ══════════════════════════════ */
    function openLevelsPage() {
        closeStoriesIfOpen(() => {
            levelTitle.innerText = '🎓 جميع المستويات';
            subjectsContainer.innerHTML = '';

            const levels = Object.keys(subjectsByLevel);
            levels.forEach((level, index) => {
                const cardClass  = levelCardClass[level] || 'level-card-1';
                const emoji      = levelEmoji[level] || '📚';
                const count      = subjectsByLevel[level].length;
                const subNames   = subjectsByLevel[level].map(s => s.title).join(' · ');

                subjectsContainer.innerHTML += `
                    <div class="subject-card bg-white rounded-[30px] overflow-hidden shadow-xl"
                         style="animation-delay:${index * 0.07}s"
                         onclick="handleGoToLevel('${level}')">
                        <div class="${cardClass} p-6 flex items-center gap-4">
                            <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center text-4xl flex-shrink-0">
                                ${emoji}
                            </div>
                            <div>
                                <h2 class="text-2xl font-black text-white">${level}</h2>
                                <p class="text-white/80 font-bold text-sm">${count} مواد دراسية</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <p class="text-gray-500 font-bold text-sm mb-4">${subNames}</p>
                            <div class="flex justify-between items-center">
                                <div class="flex gap-2">
                                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-bold">📖 قصص</span>
                                    <span class="bg-yellow-50 text-yellow-600 px-3 py-1 rounded-lg text-xs font-bold">🎮 ألعاب</span>
                                    <span class="bg-red-50 text-red-600 px-3 py-1 rounded-lg text-xs font-bold">🔬 البحوث المدرسية</span>
                                </div>
                                <span class="text-blue-500 font-black">← دخول</span>
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    window.handleOpenLevelsPage = openLevelsPage;

    window.handleGoToLevel = function(level) {
        const btns = document.querySelectorAll('.level-btn');
        let matchBtn = null;
        btns.forEach(b => { if (b.textContent.trim() === level) matchBtn = b; });
        renderSubjects(level, matchBtn);
    };

    /* ── About Page ── */
    function openAboutPage() {
        closeStoriesIfOpen(() => {
            levelTitle.innerText = '✨ مرحبًا بكم ✨';
            subjectsContainer.innerHTML = `
                <div class="col-span-full">
                    <div class="bg-white rounded-[35px] p-10 shadow-2xl text-center">
                        <img src="./images/logo.png.png" class="w-56 h-56 mx-auto mb-6 object-contain" alt="شعار" />
                        <h1 class="text-6xl font-black text-blue-700 mb-6">منصة نجم الدين همادي</h1>
                        <p class="text-2xl font-bold text-gray-700 leading-loose">
                            منصة تعليمية مخصصة لتلاميذ المرحلة الابتدائية،
                            تهدف إلى تسهيل الوصول إلى الدروس والتمارين والاختبارات
                            بطريقة منظمة وسهلة الاستعمال.
                        </p>
                        <div class="mt-10 grid md:grid-cols-3 gap-6">
                            <div onclick="handleOpenStoriesPage()" class="about-feature-card cursor-pointer bg-gradient-to-br from-blue-50 to-indigo-100 p-6 rounded-3xl border-2 border-blue-200 hover:border-blue-400 hover:shadow-xl transition-all duration-300 hover:-translate-y-2 active:scale-95 group"
                                 style="animation: featureCardIn 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay:0.1s">
                                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-blue-500 flex items-center justify-center text-3xl shadow-lg group-hover:scale-110 transition-transform duration-300">📖</div>
                                <h2 class="text-2xl font-black text-blue-700 mb-3">قصص</h2>
                                <p class="font-bold text-gray-600 text-sm leading-relaxed">قصص ممتعة مرتبة حسب المستويات والمواد.</p>
                                <div class="mt-4 inline-flex items-center gap-1 text-blue-500 font-black text-sm group-hover:gap-3 transition-all duration-300">← انقر للدخول</div>
                            </div>
                            <div onclick="handleOpenGamesPage()" class="about-feature-card cursor-pointer bg-gradient-to-br from-yellow-50 to-orange-100 p-6 rounded-3xl border-2 border-yellow-200 hover:border-yellow-400 hover:shadow-xl transition-all duration-300 hover:-translate-y-2 active:scale-95 group"
                                 style="animation: featureCardIn 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay:0.25s">
                                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-yellow-500 flex items-center justify-center text-3xl shadow-lg group-hover:scale-110 transition-transform duration-300">🎮</div>
                                <h2 class="text-2xl font-black text-yellow-700 mb-3">ألعاب</h2>
                                <p class="font-bold text-gray-600 text-sm leading-relaxed">ألعاب تعليمية ممتعة لتثبيت المكتسبات.</p>
                                <div class="mt-4 inline-flex items-center gap-1 text-yellow-500 font-black text-sm group-hover:gap-3 transition-all duration-300">← انقر للألعاب</div>
                            </div>
                            <div onclick="handleOpenResearchPage()" class="about-feature-card cursor-pointer bg-gradient-to-br from-red-50 to-rose-100 p-6 rounded-3xl border-2 border-red-200 hover:border-red-400 hover:shadow-xl transition-all duration-300 hover:-translate-y-2 active:scale-95 group"
                                 style="animation: featureCardIn 0.5s cubic-bezier(.34,1.56,.64,1) both; animation-delay:0.4s">
                                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-red-500 flex items-center justify-center text-3xl shadow-lg group-hover:scale-110 transition-transform duration-300">🔬</div>
                                <h2 class="text-2xl font-black text-red-700 mb-3">البحوث المدرسية</h2>
                                <p class="font-bold text-gray-600 text-sm leading-relaxed">بحوث مدرسية منظمة للمراجعة والاستعداد الجيد.</p>
                                <div class="mt-4 inline-flex items-center gap-1 text-red-500 font-black text-sm group-hover:gap-3 transition-all duration-300">← انقر للبحوث</div>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    /* ── Auth ── */
    function openLogin() {
        closeStoriesIfOpen(() => {
            levelTitle.innerText = '🔐 تسجيل الدخول';
            subjectsContainer.innerHTML = `
                <div class="col-span-full flex justify-center">
                    <div class="bg-white p-10 rounded-[35px] shadow-2xl w-full max-w-md">
                        <h1 class="text-5xl font-black text-center text-blue-700 mb-8">تسجيل الدخول</h1>
                        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full border-2 border-blue-200 rounded-2xl p-4 mb-4 font-bold" />
                        <input id="password" type="password" placeholder="كلمة المرور" class="w-full border-2 border-blue-200 rounded-2xl p-4 mb-6 font-bold" />
                        <button onclick="handleLogin()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-green-700 transition-colors">دخول</button>
                    </div>
                </div>`;
        });
    }

    async function login() {
        const email    = document.getElementById('email')?.value;
        const password = document.getElementById('password')?.value;
        if (!email || !password) { alert('يرجى إدخال البيانات'); return; }
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { alert('فشل: ' + error.message); return; }
        isAdmin = true;
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('bg-btn-container').classList.remove('hidden');
        alert('✅ تم تسجيل الدخول');
        renderSubjects('السنة الأولى');
    }

    async function logout() {
        await supabase.auth.signOut();
        isAdmin = false;
        document.getElementById('logout-btn').classList.add('hidden');
        document.getElementById('bg-btn-container').classList.add('hidden');
        if (currentSubject) goBack();
        setTimeout(() => renderSubjects('السنة الأولى'), 600);
    }

    async function checkUser() {
        const { data } = await supabase.auth.getSession();
        if (data.session) isAdmin = true;
    }

    window.handleOpenAboutPage  = openAboutPage;
    window.handleOpenLogin      = openLogin;
    window.handleLogin          = login;
    window.handleLogout         = logout;
    window.handleRenderSubjects = renderSubjects;

    searchInput.addEventListener('input', () => renderSubjects(currentLevel));

    async function startApp() {
        const savedBg = localStorage.getItem('siteBackground');
        if (savedBg) {
            Object.assign(document.body.style, {
                backgroundImage: `url('${savedBg}')`, backgroundSize:'cover',
                backgroundPosition:'center', backgroundAttachment:'fixed',
            });
        }
        await checkUser();
        if (isAdmin) {
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('bg-btn-container').classList.remove('hidden');
        }
        renderSubjects('السنة الأولى');
    }
    startApp();
</script>

<script>
    const changeBgBtn = document.getElementById('changeBgBtn');
    const bgInput     = document.getElementById('bgInput');
    changeBgBtn.addEventListener('click', () => bgInput.click());
    bgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const url = ev.target.result;
            Object.assign(document.body.style, {
                backgroundImage: `url('${url}')`, backgroundSize:'cover',
                backgroundPosition:'center', backgroundAttachment:'fixed',
            });
            localStorage.setItem('siteBackground', url);
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
