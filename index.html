<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>

            font-family: 'Cairo', sans-serif;

        }

</head>

<body>

    <div class="w-full min-h-screen bg-[#edf5f3] shadow-2xl overflow-hidden">

    </div>

    <script type="module">

        /* =========================

            'السنة الثالثة': [

                { title: 'الإيقاظ العلمي', id: 'science' }
            ],

                { title: 'الرياضيات', id: 'math' },

            ],

                { title: 'اللغة العربية', id: 'arabic' },

        const levelMap = {

        };
        /* =========================
        CLEAN TEXT
        ========================= */

        function cleanText(text) {

            return text
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .toLowerCase()
                .trim();

        }

        /* =========================
        SECTION
        ========================= */

        function createSection(title, color, folder) {

            let style = {
                blue: { bg: 'bg-blue-50', text: 'text-blue-700', btn: 'bg-blue-700' },
                yellow: { bg: 'bg-yellow-50', text: 'text-yellow-700', btn: 'bg-yellow-700' },
                red: { bg: 'bg-red-50', text: 'text-red-700', btn: 'bg-red-700' }
            }[color];

            return `
<div class="${style.bg} rounded-2xl p-4" data-folder="${folder}">

<div class="flex justify-between items-center">

<h3 class="font-black ${style.text} text-xl">
${title}
</h3>

<button class="upload-btn ${style.btn} text-white px-5 py-3 rounded-xl font-bold hidden">
رفع
</button>

</div>

<div class="files-box mt-4 space-y-3"></div>

</div>
`;

        }

        /* =========================
        CARD
        ========================= */

        function createCard(subject, color, subjectId, level) {

            return `

<div
class="card bg-white rounded-[30px] p-6 shadow-xl"
data-level="${levelMap[level]}"
>

<h2
data-subject="${subjectId}"
class="text-5xl font-black ${color} mb-6">
${subject}
</h2>

<div class="space-y-4">

${createSection('الدروس', 'blue', 'lessons')}
${createSection('التمارين', 'yellow', 'exercises')}
${createSection('الاختبارات', 'red', 'exams')}

</div>

</div>

`;

        }

        /* =========================
        LOAD FILES
        ========================= */

        async function loadFiles() {

            const cards =
                document.querySelectorAll('.card');

            for (const card of cards) {

                const subject =
                    card.querySelector('h2').dataset.subject;

                const sections =
                    card.querySelectorAll('[data-folder]');

                for (const section of sections) {

                    const folder =
                        section.dataset.folder;

                    const filesBox =
                        section.querySelector('.files-box');

                    filesBox.innerHTML = '';

                    const level =
                        card.dataset.level;

                    const path =
                        `${level}/${subject}/${folder}`;

                    const { data, error } =
                        await supabase
                            .from('files')
                            .select('*')
                            .eq('level', level)
                            .eq('subject', subject)
                            .eq('folder', folder);

                    if (error) {
                        console.error(error);
                        continue;
                    }

                    (data || []).forEach(file => {


                        filesBox.innerHTML += `

<div class="bg-white border rounded-2xl p-3 flex justify-between items-center">

<p class="font-bold text-blue-700 text-sm overflow-hidden whitespace-nowrap text-ellipsis max-w-[150px]">
${file.name}
</p>

<div class="flex gap-2">

<a
href="${file.url}"
target="_blank"
class="bg-blue-600 text-white px-3 py-2 rounded-xl text-sm font-bold">
فتح
</a>

<a
href="${file.url}"
target="_blank"
class="bg-green-600 text-white px-3 py-2 rounded-xl text-sm font-bold">
تحميل
</a>

</div>

</div>

`;

                    });

                }

            }

        }
        /* =========================
        UPLOAD
        ========================= */

        function attachUploadEvents() {

            document
                .querySelectorAll('.upload-btn')
                .forEach(button => {

                    button.onclick = null;

                    button.addEventListener('click', () => {

                        const input =
                            document.createElement('input');

                        input.type = 'file';

                        input.accept =
                            '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4';

                        input.onchange = async (e) => {

                            const file =
                                e.target.files[0];
                            const file = e.target.files[0];

                            if (!file) return;

                            const safeFileName = file.name;

                            button.disabled = true;
                            button.innerText = 'جاري الرفع...';

                            try {

                                const subject =
                                    button.closest('.card')
                                        .querySelector('h2')
                                        .dataset.subject;

                                const folder =
                                    button.closest('[data-folder]')
                                        .dataset.folder;

                                const level =
                                    button
                                        .closest('.card')
                                        .dataset.level;

                                const safeFileName =
                                    file.name;

                                const path =
                                    `${level}/${subject}/${folder}/${Date.now()}-${safeFileName}`;

                                const { data: uploadData, error } =
                                    await supabase.storage
                                        .from(BUCKET)
                                        .upload(path, file, {
                                            upsert: true,
                                            contentType: file.type
                                        });

                                if (error) {
                                    console.error(error);
                                    alert(error.message);
                                    button.disabled = false;
                                    button.innerText = 'رفع';
                                    return;
                                }

                                const { data: publicUrlData } =
                                    supabase.storage
                                        .from(BUCKET)
                                        .getPublicUrl(path);

                                await supabase
                                    .from('files')
                                    .insert([{
                                        name: file.name,
                                        url: publicUrlData.publicUrl,
                                        level,
                                        subject,
                                        folder
                                    }]);

                                alert('تم رفع الملف بنجاح');

                                button.disabled = false;
                                button.innerText = 'رفع';

                                loadFiles();

                            }
                            catch (err) {

                                console.error(err);

                                alert('فشل رفع الملف');

                                button.disabled = false;
                                button.innerText = 'رفع';

                            }

                        };

                        input.click();

                    });

                });

        }

        /* =========================
        RENDER
        ========================= */
        /* =========================
        DELETE FILE
        ========================= */

        window.deleteFile = async function (filePath) {

            const confirmDelete =
                confirm('هل تريد حذف الملف؟');

            if (!confirmDelete) return;

            const { error } =
                await supabase.storage
                    .from(BUCKET)
                    .remove([filePath]);

            if (error) {

                console.error(error);

                alert('فشل حذف الملف');

                return;

            }

            alert('تم حذف الملف بنجاح');

            loadFiles();

        }
        /* =========================
      ABOUT PAGE
      ========================= */

        window.openAboutPage = function () {

            subjectsContainer.innerHTML = `

<div class="col-span-full">

<div class="mt-10 grid md:grid-cols-3 gap-6">

</div>

`;

            levelTitle.innerText =
                '✨ مرحبًا بكم ✨';

        }
        /* =========================
      AUTH
      ========================= */

        let isAdmin = false;

        window.openLogin = function () {

            subjectsContainer.innerHTML = `

<div class="col-span-full flex justify-center">

<div class="bg-white p-10 rounded-[35px] shadow-2xl w-full max-w-md">

<h1 class="text-5xl font-black text-center text-blue-700 mb-8">
تسجيل الدخول
</h1>

<input
id="email"
type="email"
placeholder="البريد الإلكتروني"

</button>

`;

        }

        /* LOGIN */

        window.login = async function () {

            const email =
                document.getElementById('email').value;

            const password =
                document.getElementById('password').value;

            const { error } =
                await supabase.auth.signInWithPassword({
                    email,
                    password
                });

            if (error) {

                alert(error.message);
                return;

            }

            isAdmin = true;
            document
                .getElementById('logout-btn')
                .classList.remove('hidden');
            document
                .getElementById('bg-btn-container')
                .classList.remove('hidden');
            alert('تم تسجيل الدخول');

            renderSubjects('السنة الأولى');

        }

        /* CHECK USER */

        /* CHECK USER */

        async function checkUser() {

            const { data } =
                await supabase.auth.getSession();

            if (data.session) {

                isAdmin = true;

            }

        }

        /* LOGOUT */

        window.logout = async function () {

            await supabase.auth.signOut();

            isAdmin = false;

            document
                .getElementById('logout-btn')
                .classList.add('hidden');
            document
                .getElementById('bg-btn-container')
                .classList.add('hidden');
            alert('تم تسجيل الخروج');

            renderSubjects('السنة الأولى');

        }
        window.renderSubjects = function (level, btn = null) {

            level =
                String(level).trim();

            levelTitle.innerText =
                `✨ ${level} ✨`;

            subjectsContainer.innerHTML = '';

            document
                .querySelectorAll('.level-btn')
                .forEach(b => {

                    b.classList.remove(
                        'bg-green-600',
                        'text-white'
                    );

                    b.classList.add(
                        'bg-white'
                    );

                });

            if (btn) {

                btn.classList.remove('bg-white');

                btn.classList.add(
                    'bg-green-600',
                    'text-white'
                );

            }

            const search =
                searchInput.value.trim();

            const subjects =
                (subjectsByLevel[level] || [])
                    .filter(subject =>
                        subject.title.includes(search)
                    );

            if (subjects.length === 0) {

                subjectsContainer.innerHTML = `
<div class="col-span-full text-center">
<h2 class="text-4xl font-black text-red-500">
لا توجد مواد
</h2>
</div>
`;

                return;

            }

            subjects.forEach(subject => {

                let color = 'text-blue-700';

                if (subject.id === 'math') {
                    color = 'text-indigo-700';
                }

                if (subject.id === 'arabic') {
                    color = 'text-green-700';
                }

                if (subject.id === 'science') {
                    color = 'text-orange-700';
                }

                if (subject.id === 'french') {
                    color = 'text-pink-700';
                }

                subjectsContainer.innerHTML +=
                    createCard(
                        subject.title,
                        color,
                        subject.id,
                        level
                    );

            });

            attachUploadEvents();
            if (isAdmin) {

                document
                    .querySelectorAll('.upload-btn')
                    .forEach(btn => {

                        btn.classList.remove('hidden');

                    });

            }
            loadFiles();

        }

        /* =========================
        SEARCH
        ========================= */

        searchInput.addEventListener('input', () => {

            const level =
                levelTitle.innerText
                    .replaceAll('✨', '')
                    .trim();

            renderSubjects(level);

        });

        /* =========================
        START
        ========================= */

        async function startApp() {
            document.body.style.backgroundImage =
                "url('./images/backgrounds/bg1.jpg')";

            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            await checkUser();

            if (isAdmin) {

                document
                    .getElementById('logout-btn')
                    .classList.remove('hidden');
                document
                    .getElementById('bg-btn-container')
                    .classList.remove('hidden');
            }

            renderSubjects('السنة الأولى');

        }

        startApp();

    </script>
    <script>
        const changeBgBtn = document.getElementById("changeBgBtn");
        const bgInput = document.getElementById("bgInput");

        /* عند الضغط على الزر */
        changeBgBtn.addEventListener("click", () => {
            bgInput.click();
        });

        /* عند اختيار صورة */
        bgInput.addEventListener("change", (e) => {

            const file = e.target.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (event) {

                document.body.style.backgroundImage =
                    `url('${event.target.result}')`;

                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";

                /* حفظ الخلفية */
                localStorage.setItem(
                    "siteBackground",
                    event.target.result
                );
            };

            reader.readAsDataURL(file);
        });

        /* استرجاع الخلفية بعد تحديث الصفحة */
        window.addEventListener("load", () => {

            const savedBg =
                localStorage.getItem("siteBackground");

            if (savedBg) {

                document.body.style.backgroundImage =
                    `url('${savedBg}')`;

                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
            }
        });
    </script>

    
</body>
